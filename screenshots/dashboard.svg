    <rect x="110" y="46" width="220" height="14" rx="4" fill="#34c759"/>
    <text x="336" y="57" font-size="9" font-weight="600" fill="#34c759">97%</text>

    <text x="16" y="78" font-size="10" fill="#1d1d1f">Comp Sci</text>
    <rect x="110" y="68" width="214" height="14" rx="4" fill="#34c759"/>
    <text x="330" y="79" font-size="9" font-weight="600" fill="#34c759">95%</text>

    <text x="16" y="100" font-size="10" fill="#1d1d1f">ELA 7</text>
    <rect x="110" y="90" width="206" height="14" rx="4" fill="#34c759"/>
    <text x="322" y="101" font-size="9" font-weight="600" fill="#34c759">93%</text>

    <text x="16" y="122" font-size="10" fill="#1d1d1f">Am History</text>
    <rect x="110" y="112" width="192" height="14" rx="4" fill="#0071e3"/>
    <text x="308" y="123" font-size="9" font-weight="600" fill="#0071e3">88%</text>

    <text x="16" y="144" font-size="10" fill="#1d1d1f">Science 5</text>
    <rect x="110" y="134" width="186" height="14" rx="4" fill="#0071e3"/>
    <text x="302" y="145" font-size="9" font-weight="600" fill="#0071e3">86%</text>

    <text x="16" y="166" font-size="10" fill="#1d1d1f">Spanish</text>
    <rect x="110" y="156" width="156" height="14" rx="4" fill="#ff9500"/>
    <text x="272" y="167" font-size="9" font-weight="600" fill="#ff9500">72%</text>
  </g>

  <!-- Chart 3: Assignment Status (doughnut) -->
  <g transform="translate(16, 510)">
    <rect width="374" height="200" rx="14" fill="white" filter="url(#shadow)"/>
    <g transform="translate(16, 16)">
