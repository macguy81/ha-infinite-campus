    <text x="90" y="114" text-anchor="middle" font-size="8" font-weight="600" fill="#0071e3">80%</text>
    <text x="170" y="90" text-anchor="middle" font-size="8" font-weight="600" fill="#0071e3">87%</text>
    <text x="250" y="97" text-anchor="middle" font-size="8" font-weight="600" fill="#0071e3">85%</text>
    <text x="330" y="76" text-anchor="middle" font-size="8" font-weight="600" fill="#0071e3">91%</text>
  </g>

