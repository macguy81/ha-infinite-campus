    <circle cx="120" cy="120" r="52" fill="none" stroke="#ff3b30" stroke-width="16" stroke-dasharray="22.8 303.9" stroke-dashoffset="-152.9" transform="rotate(-90 120 120)"/>
    <circle cx="120" cy="120" r="52" fill="none" stroke="#ff9500" stroke-width="16" stroke-dasharray="29.4 297.3" stroke-dashoffset="-175.7" transform="rotate(-90 120 120)"/>
    <circle cx="120" cy="120" r="52" fill="none" stroke="#0071e3" stroke-width="16" stroke-dasharray="39.9 286.8" stroke-dashoffset="-205.1" transform="rotate(-90 120 120)"/>
