<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" viewBox="0 0 800 520">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="106%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#000" flood-opacity="0.06"/>
    </filter>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" fill="#f5f5f7" rx="12"/>

  <!-- Header -->
  <rect width="800" height="48" fill="rgba(255,255,255,0.85)" rx="12"/>
  <text x="24" y="31" font-size="16" font-weight="600" fill="#1d1d1f">Infinite Campus</text>
  <rect x="680" y="14" width="96" height="22" rx="11" fill="rgba(52,199,89,0.12)"/>
  <circle cx="694" cy="25" r="3.5" fill="#34c759"/>
  <text x="703" y="29" font-size="11" font-weight="500" fill="#248a3d">Running</text>

  <!-- Tab bar -->
  <rect x="16" y="60" width="768" height="36" rx="10" fill="rgba(118,118,128,0.12)"/>
  <rect x="18" y="62" width="150" height="32" rx="8" fill="white" filter="url(#shadow)"/>
  <text x="93" y="83" text-anchor="middle" font-size="12" font-weight="600" fill="#1d1d1f">Dashboard</text>
  <text x="247" y="83" text-anchor="middle" font-size="12" font-weight="500" fill="#1d1d1f">Students</text>
  <text x="397" y="83" text-anchor="middle" font-size="12" font-weight="500" fill="#1d1d1f">Grades</text>
  <text x="547" y="83" text-anchor="middle" font-size="12" font-weight="500" fill="#1d1d1f">Assignments</text>
  <text x="697" y="83" text-anchor="middle" font-size="12" font-weight="500" fill="#1d1d1f">Settings</text>

  <!-- Stats Grid -->
  <g transform="translate(16, 112)">
    <!-- Stat 1 -->
    <rect width="120" height="70" rx="14" fill="white" filter="url(#shadow)"/>
    <text x="60" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#1d1d1f">2</text>
    <text x="60" y="56" text-anchor="middle" font-size="9" font-weight="500" fill="#86868b" letter-spacing="0.5">STUDENTS</text>

    <!-- Stat 2 -->
    <g transform="translate(132, 0)">
      <rect width="120" height="70" rx="14" fill="white" filter="url(#shadow)"/>
      <text x="60" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#1d1d1f">14</text>
      <text x="60" y="56" text-anchor="middle" font-size="9" font-weight="500" fill="#86868b" letter-spacing="0.5">COURSES</text>
    </g>

    <!-- Stat 3 -->
    <g transform="translate(264, 0)">
      <rect width="120" height="70" rx="14" fill="white" filter="url(#shadow)"/>
      <text x="60" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#1d1d1f">42</text>
      <text x="60" y="56" text-anchor="middle" font-size="9" font-weight="500" fill="#86868b" letter-spacing="0.5">GRADES</text>
    </g>

    <!-- Stat 4 -->
    <g transform="translate(396, 0)">
      <rect width="120" height="70" rx="14" fill="white" filter="url(#shadow)"/>
      <text x="60" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#1d1d1f">186</text>
      <text x="60" y="56" text-anchor="middle" font-size="9" font-weight="500" fill="#86868b" letter-spacing="0.5">ASSIGNMENTS</text>
    </g>

    <!-- Stat 5 -->
    <g transform="translate(528, 0)">
      <rect width="120" height="70" rx="14" fill="white" filter="url(#shadow)"/>
      <text x="60" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#1d1d1f">12</text>
      <text x="60" y="56" text-anchor="middle" font-size="9" font-weight="500" fill="#86868b" letter-spacing="0.5">ALERTS SENT</text>
    </g>

    <!-- Stat 6 -->
    <g transform="translate(660, 0)">
      <rect width="108" height="70" rx="14" fill="white" filter="url(#shadow)"/>
      <text x="54" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#1d1d1f">3:45</text>
      <text x="54" y="56" text-anchor="middle" font-size="9" font-weight="500" fill="#86868b" letter-spacing="0.5">LAST UPDATE</text>
    </g>
  </g>

  <!-- Quick Actions -->
  <g transform="translate(16, 198)">
    <rect width="768" height="72" rx="14" fill="white" filter="url(#shadow)"/>
    <text x="20" y="28" font-size="13" font-weight="600" fill="#1d1d1f">Quick Actions</text>
    <rect x="20" y="40" width="110" height="22" rx="11" fill="#0071e3"/>
    <text x="75" y="55" text-anchor="middle" font-size="11" font-weight="500" fill="white">Refresh Data</text>
    <rect x="140" y="40" width="110" height="22" rx="11" fill="#34c759"/>
    <text x="195" y="55" text-anchor="middle" font-size="11" font-weight="500" fill="white">Start Service</text>
    <rect x="260" y="40" width="110" height="22" rx="11" fill="#ff3b30"/>
    <text x="315" y="55" text-anchor="middle" font-size="11" font-weight="500" fill="white">Stop Service</text>
  </g>

  <!-- Recent Assignments -->
  <g transform="translate(16, 286)">
    <rect width="768" height="220" rx="14" fill="white" filter="url(#shadow)"/>
    <text x="20" y="28" font-size="13" font-weight="600" fill="#1d1d1f">Recent Assignments</text>

    <!-- Table Header -->
    <text x="20" y="52" font-size="9" font-weight="600" fill="#86868b" letter-spacing="0.5">STUDENT</text>
    <text x="120" y="52" font-size="9" font-weight="600" fill="#86868b" letter-spacing="0.5">ASSIGNMENT</text>
    <text x="380" y="52" font-size="9" font-weight="600" fill="#86868b" letter-spacing="0.5">COURSE</text>
    <text x="540" y="52" font-size="9" font-weight="600" fill="#86868b" letter-spacing="0.5">DUE</text>
    <text x="620" y="52" font-size="9" font-weight="600" fill="#86868b" letter-spacing="0.5">SCORE</text>
    <text x="700" y="52" font-size="9" font-weight="600" fill="#86868b" letter-spacing="0.5">STATUS</text>
    <line x1="20" y1="58" x2="748" y2="58" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>

    <!-- Row 1 -->
    <text x="20" y="78" font-size="12" fill="#1d1d1f">Alex</text>
    <text x="120" y="78" font-size="12" fill="#1d1d1f">Chapter 5 Quiz</text>
    <text x="380" y="78" font-size="12" fill="#1d1d1f">ELA 7</text>
    <text x="540" y="78" font-size="12" fill="#1d1d1f">Mar 12</text>
    <text x="620" y="78" font-size="12" fill="#1d1d1f">45/50 (90%)</text>
    <rect x="700" y="67" width="44" height="16" rx="8" fill="rgba(0,113,227,0.08)"/>
    <text x="722" y="79" text-anchor="middle" font-size="9" font-weight="600" fill="#0071e3">Graded</text>
    <line x1="20" y1="88" x2="748" y2="88" stroke="rgba(0,0,0,0.03)" stroke-width="0.5"/>

    <!-- Row 2 -->
    <text x="20" y="108" font-size="12" fill="#1d1d1f">Maya</text>
    <text x="120" y="108" font-size="12" fill="#1d1d1f">Photosynthesis Lab Report</text>
    <text x="380" y="108" font-size="12" fill="#1d1d1f">Science 7</text>
    <text x="540" y="108" font-size="12" fill="#1d1d1f">Mar 13</text>
    <text x="620" y="108" font-size="12" fill="#1d1d1f">-</text>
    <rect x="700" y="97" width="56" height="16" rx="8" fill="rgba(52,199,89,0.1)"/>
    <text x="728" y="109" text-anchor="middle" font-size="9" font-weight="600" fill="#248a3d">Turned In</text>
    <line x1="20" y1="118" x2="748" y2="118" stroke="rgba(0,0,0,0.03)" stroke-width="0.5"/>

    <!-- Row 3 -->
    <text x="20" y="138" font-size="12" fill="#1d1d1f">Alex</text>
    <text x="120" y="138" font-size="12" fill="#1d1d1f">Linear Equations Practice</text>
    <text x="380" y="138" font-size="12" fill="#1d1d1f">7/8 Math</text>
    <text x="540" y="138" font-size="12" fill="#1d1d1f">Mar 11</text>
    <text x="620" y="138" font-size="12" fill="#1d1d1f">G</text>
    <rect x="700" y="127" width="44" height="16" rx="8" fill="rgba(0,113,227,0.08)"/>
    <text x="722" y="139" text-anchor="middle" font-size="9" font-weight="600" fill="#0071e3">Graded</text>
    <line x1="20" y1="148" x2="748" y2="148" stroke="rgba(0,0,0,0.03)" stroke-width="0.5"/>

    <!-- Row 4 -->
    <text x="20" y="168" font-size="12" fill="#1d1d1f">Maya</text>
    <text x="120" y="168" font-size="12" fill="#1d1d1f">American Revolution Essay</text>
    <text x="380" y="168" font-size="12" fill="#1d1d1f">History 5</text>
    <text x="540" y="168" font-size="12" fill="#1d1d1f">Mar 10</text>
    <text x="620" y="168" font-size="12" fill="#1d1d1f">-</text>
    <rect x="700" y="157" width="50" height="16" rx="8" fill="rgba(255,59,48,0.1)"/>
    <text x="725" y="169" text-anchor="middle" font-size="9" font-weight="600" fill="#d70015">Missing</text>
    <line x1="20" y1="178" x2="748" y2="178" stroke="rgba(0,0,0,0.03)" stroke-width="0.5"/>

    <!-- Row 5 -->
    <text x="20" y="198" font-size="12" fill="#1d1d1f">Alex</text>
    <text x="120" y="198" font-size="12" fill="#1d1d1f">Vocabulary Unit 8</text>
    <text x="380" y="198" font-size="12" fill="#1d1d1f">ELA 7</text>
    <text x="540" y="198" font-size="12" fill="#1d1d1f">Mar 9</text>
    <text x="620" y="198" font-size="12" fill="#1d1d1f">38/40 (95%)</text>
    <rect x="700" y="187" width="44" height="16" rx="8" fill="rgba(0,113,227,0.08)"/>
    <text x="722" y="199" text-anchor="middle" font-size="9" font-weight="600" fill="#0071e3">Graded</text>
  </g>
</svg>
