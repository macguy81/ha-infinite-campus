    <!-- Y-axis -->
    <text x="28" y="56" font-size="9" fill="#86868b">4.0</text>
    <text x="28" y="86" font-size="9" fill="#86868b">3.0</text>
    <text x="28" y="116" font-size="9" fill="#86868b">2.0</text>
    <text x="28" y="146" font-size="9" fill="#86868b">1.0</text>
    <line x1="50" y1="52" x2="362" y2="52" stroke="rgba(0,0,0,0.04)" stroke-width="0.5"/>
    <line x1="50" y1="82" x2="362" y2="82" stroke="rgba(0,0,0,0.04)" stroke-width="0.5"/>
    <line x1="50" y1="112" x2="362" y2="112" stroke="rgba(0,0,0,0.04)" stroke-width="0.5"/>
    <line x1="50" y1="142" x2="362" y2="142" stroke="rgba(0,0,0,0.04)" stroke-width="0.5"/>
    <line x1="50" y1="172" x2="362" y2="172" stroke="rgba(0,0,0,0.04)" stroke-width="0.5"/>
    <!-- Alex bar: GPA 3.52 -->
    <rect x="110" y="57" width="60" height="115" rx="6" fill="#34c759"/>
    <text x="140" y="51" text-anchor="middle" font-size="10" font-weight="700" fill="#34c759">3.52</text>
    <text x="140" y="185" text-anchor="middle" font-size="11" font-weight="500" fill="#1d1d1f">Alex</text>
    <!-- Maya bar: GPA 3.15 -->
    <rect x="230" y="68" width="60" height="104" rx="6" fill="#0071e3"/>
    <text x="260" y="62" text-anchor="middle" font-size="10" font-weight="700" fill="#0071e3">3.15</text>
    <text x="260" y="185" text-anchor="middle" font-size="11" font-weight="500" fill="#1d1d1f">Maya</text>
  </g>

  <!-- Recent Assignments (truncated) -->
  <g transform="translate(16, 722)">
    <rect width="768" height="46" rx="14" fill="white" filter="url(#shadow)"/>
    <text x="20" y="28" font-size="13" font-weight="600" fill="#1d1d1f">Recent Assignments</text>
    <text x="748" y="28" text-anchor="end" font-size="11" fill="#86868b">5 rows ▾</text>
  </g>
</svg>
