    <text x="120" y="132" text-anchor="middle" font-size="9" fill="#86868b">total</text>
    <!-- Legend -->
    <circle cx="210" cy="75" r="4" fill="#34c759"/>
    <text x="220" y="79" font-size="11" fill="#1d1d1f"><tspan font-weight="600">132</tspan> Completed</text>
    <circle cx="210" cy="100" r="4" fill="#ff3b30"/>
    <text x="220" y="104" font-size="11" fill="#1d1d1f"><tspan font-weight="600">7</tspan> Missing</text>
    <circle cx="210" cy="125" r="4" fill="#ff9500"/>
    <text x="220" y="129" font-size="11" fill="#1d1d1f"><tspan font-weight="600">9</tspan> Late</text>
    <circle cx="210" cy="150" r="4" fill="#0071e3"/>
    <text x="220" y="154" font-size="11" fill="#1d1d1f"><tspan font-weight="600">38</tspan> Pending</text>
  </g>

  <!-- Chart 4: GPA by Student (bar) -->
  <g transform="translate(402, 510)">
    <rect width="382" height="200" rx="14" fill="white" filter="url(#shadow)"/>
    <g transform="translate(16, 16)">
      <path d="M14 8v4M2 8l6-3 6 3-6 3z" fill="none" stroke="#6e3de8" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M4 9v3c2 2 6 2 8 0V9" fill="none" stroke="#6e3de8" stroke-width="1.5" stroke-linecap="round"/>
      <text x="22" y="12" font-size="13" font-weight="600" fill="#1d1d1f">GPA by Student</text>
