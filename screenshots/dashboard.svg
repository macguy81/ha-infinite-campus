    <rect x="128" y="32" width="100" height="18" rx="9" fill="#34c759"/>
    <text x="178" y="45" text-anchor="middle" font-size="10" font-weight="500" fill="white">Start Service</text>
    <rect x="236" y="32" width="100" height="18" rx="9" fill="#ff3b30"/>
    <text x="286" y="45" text-anchor="middle" font-size="10" font-weight="500" fill="white">Stop Service</text>
  </g>

  <!-- Student Filter Pills -->
  <rect x="16" y="268" width="36" height="22" rx="11" fill="#1d1d1f"/>
  <text x="34" y="283" text-anchor="middle" font-size="10" font-weight="500" fill="white">All</text>
  <rect x="58" y="268" width="44" height="22" rx="11" fill="white" stroke="rgba(0,0,0,0.06)"/>
  <text x="80" y="283" text-anchor="middle" font-size="10" font-weight="500" fill="#1d1d1f">Alex</text>
  <rect x="108" y="268" width="50" height="22" rx="11" fill="white" stroke="rgba(0,0,0,0.06)"/>
  <text x="133" y="283" text-anchor="middle" font-size="10" font-weight="500" fill="#1d1d1f">Maya</text>

  <!-- ═══ CHARTS GRID (2x2) ═══ -->

  <!-- Chart 1: Grade Trends (line chart) -->
  <g transform="translate(16, 298)">
    <rect width="374" height="200" rx="14" fill="white" filter="url(#shadow)"/>
    <g transform="translate(16, 16)">
      <line x1="0" y1="2" x2="14" y2="10" stroke="#0071e3" stroke-width="2" stroke-linecap="round"/>
      <line x1="14" y1="10" x2="14" y2="2" stroke="#0071e3" stroke-width="2" stroke-linecap="round"/>
      <text x="22" y="10" font-size="13" font-weight="600" fill="#1d1d1f">Grade Trends</text>
    </g>
    <!-- Y-axis labels -->
    <text x="26" y="56" font-size="9" fill="#86868b">100</text>
    <text x="30" y="90" font-size="9" fill="#86868b">90</text>
    <text x="30" y="124" font-size="9" fill="#86868b">80</text>
    <text x="30" y="158" font-size="9" fill="#86868b">70</text>
    <!-- Grid lines -->
    <line x1="50" y1="52" x2="354" y2="52" stroke="rgba(0,0,0,0.04)" stroke-width="0.5"/>
    <line x1="50" y1="86" x2="354" y2="86" stroke="rgba(0,0,0,0.04)" stroke-width="0.5"/>
    <line x1="50" y1="120" x2="354" y2="120" stroke="rgba(0,0,0,0.04)" stroke-width="0.5"/>
    <line x1="50" y1="154" x2="354" y2="154" stroke="rgba(0,0,0,0.04)" stroke-width="0.5"/>
