      <line x1="8" y1="3" x2="8" y2="7" stroke="#ff9500" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="8" y1="7" x2="11" y2="9" stroke="#ff9500" stroke-width="1.5" stroke-linecap="round"/>
      <text x="22" y="12" font-size="13" font-weight="600" fill="#1d1d1f">Assignment Status</text>
