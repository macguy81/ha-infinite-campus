    <text x="170" y="175" text-anchor="middle" font-size="9" fill="#86868b">M2</text>
    <text x="250" y="175" text-anchor="middle" font-size="9" fill="#86868b">M3</text>
    <text x="330" y="175" text-anchor="middle" font-size="9" fill="#86868b">M4</text>
    <!-- Line chart area fill -->
    <polygon points="90,120 170,96 250,103 330,82 330,154 90,154" fill="rgba(0,113,227,0.08)"/>
    <!-- Line chart -->
    <polyline points="90,120 170,96 250,103 330,82" fill="none" stroke="#0071e3" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Points -->
    <circle cx="90" cy="120" r="4" fill="#0071e3"/>
    <circle cx="170" cy="96" r="4" fill="#0071e3"/>
    <circle cx="250" cy="103" r="4" fill="#0071e3"/>
    <circle cx="330" cy="82" r="4" fill="#0071e3"/>
