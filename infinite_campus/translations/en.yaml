---
configuration:
  ic_base_url:
    name: "Infinite Campus Base URL"
    description: "Your school district's Infinite Campus URL (e.g., https://yourdistrict.infinitecampus.org)"
  ic_district:
    name: "District (appName)"
    description: "Your school district identifier. Find it by inspecting the login page for the 'appName' input field."
  ic_username:
    name: "Username"
    description: "Your Infinite Campus parent portal username"
  ic_password:
    name: "Password"
    description: "Your Infinite Campus parent portal password"
  whatsapp_phone:
    name: "WhatsApp Phone Number"
    description: "Your WhatsApp number with country code (e.g., +12125551234)"
