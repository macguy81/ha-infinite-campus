    name: "WhatsApp API Key (CallMeBot)"
    description: "API key from CallMeBot. Send 'I allow callmebot to send me messages' to +34 644 51 95 23 on WhatsApp to get one."
  poll_interval:
    name: "Poll Interval (seconds)"
    description: "How often to check for new data (minimum 300 seconds)"
  notify_grades:
    name: "Grade Notifications"
